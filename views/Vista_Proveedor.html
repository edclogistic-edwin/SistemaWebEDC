    <link rel="stylesheet" href="../css/style_proveedor.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>

            <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>

            <a href="Vista_Perfil.html" id="perfilBtn" class="nav-link">Perfil</a>
            <a href="#" id="logoutBtn" class="nav-link logout">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <h1>Lista de Proveedores</h1>

        <!-- B�sSQUEDA -->
        <div style="display: flex; gap: 12px; margin-bottom: 20px; align-items: center;">
            <input type="text" id="buscador" placeholder="Buscar por RUC o Nombre..."
                style="flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; font-family: 'Inter', sans-serif;">
            <button id="btnBuscar"
                style="padding: 12px 24px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">Buscar</button>
            <button id="btnRefrescar"
                style="padding: 12px 24px; border: none; border-radius: 8px; background:  var(--primary-red); color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">Refrescar</button>
        </div>

        <a href="agregar_proveedor.html">
            <button class="btn-agregar" style="border: none; background: transparent; cursor: pointer;">Agregar
                Proveedor</button>
        </a>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>RUC</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Dirección</th>
                        <th>Observaciones</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProveedores">
                    <tr>
                        <td colspan="9">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

     <script src="../js/dropdown.js"></script>
    <script>
      let todosLosProveedores = [];

        async function cargarProveedores() {

    const tbody =
        document.getElementById(
            'tablaProveedores'
        );

    try {

        const response =
            await fetch(
                '/api/proveedores'
            );

        const data =
            await response.json();

        if (!response.ok) {

            throw new Error(
                data.message
            );
        }

        todosLosProveedores =
            data;

        if (data.length === 0) {

            tbody.innerHTML =
                `<tr>
                    <td colspan="9">
                        No hay proveedores registrados
                    </td>
                </tr>`;

            return;
        }

        mostrarProveedores(
            data
        );

    } catch (error) {

        console.error(error);

        tbody.innerHTML =
            `<tr>
                <td colspan="9"
                    style="
                        text-align:center;
                        color:red;
                        padding:40px;
                    ">
                    Error:
                    ${error.message}
                </td>
            </tr>`;
    }
}

        function mostrarProveedores(proveedores) {
            const tbody = document.getElementById('tablaProveedores');

            if (proveedores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9">No se encontraron proveedores</td></tr>';
                return;
            }

            tbody.innerHTML = proveedores.map(p => `
                <tr style="${!p.estado ? 'background: #f5f5f5; color: #666;' : ''}">
                    <td>${p.id_proveedor}</td>
                    <td>${p.ruc || '-'}</td>
                    <td>${p.nombre}</td>
                    <td>${p.telefono || '-'}</td>
                    <td>${p.correo || '-'}</td>
                    <td>${p.direccion || '-'}</td>
                    <td>${p.observaciones || '-'}</td>
                    <td>${p.estado ? 'Activo' : 'Inactivo'}</td>
                    <td style="text-align: center;">
                        <a href="editar_proveedor.html?id=${p.id_proveedor}" style="color: #0ea5e9; text-decoration: none; font-weight: 600; margin-right: 8px;">Editar</a>
                    </td>
                </tr>
            `).join('');
        }

        // FUNCI�"N DE B�sSQUEDA
        function buscarProveedores() {
            const termino = document.getElementById('buscador').value.toLowerCase().trim();

            if (termino === '') {
                mostrarProveedores(todosLosProveedores);
                return;
            }

            const filtrados = todosLosProveedores.filter(p =>
                (p.ruc && p.ruc.includes(termino)) ||
                (p.nombre && p.nombre.toLowerCase().includes(termino))
            );

            mostrarProveedores(filtrados);
        }

        // EVENTOS
        document.getElementById('btnBuscar').addEventListener('click', buscarProveedores);

        document.getElementById('buscador').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                buscarProveedores();
            }
        });

        document.getElementById('btnRefrescar').addEventListener('click', () => {
            document.getElementById('buscador').value = '';
            mostrarProveedores(todosLosProveedores);
        });

        cargarProveedores();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>

</html>
