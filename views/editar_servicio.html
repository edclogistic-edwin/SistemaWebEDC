            <div class="form-group">

            <button type="submit" class="btn-primary" style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar Cambios</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jryfzkfiutekhhxbmezs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_of5dF0BUk5mebRvzDlRecA_Dy7GTKxU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const idServicio = urlParams.get('id');

        if (!idServicio) {
            alert('ID de servicio no proporcionado');
            window.location.href = 'Vista_Servicio.html';
        }

        const form = document.getElementById('formEditar');
        const mensaje = document.getElementById('mensaje');

        // Cargar conductores y carretas PRIMERO
        async function cargarSelects() {
            console.log('�Y"� CARGANDO SELECTS...');
            const conductorSelect = document.getElementById('id_conductor');
            const carretaSelect = document.getElementById('id_carreta');

            const { data: conductores, error: e1 } = await supabaseClient.from('conductor').select('id_conductor, nombres, apellidos').filter('estado', 'eq', true);
            console.log('CONDUCTORES:', conductores, 'ERROR:', e1);
            
            if (e1) {
                console.error('ERROR CONDUCTORES:', e1);
                conductorSelect.innerHTML = '<option value="">ERROR: ' + e1.message + '</option>';
            } else if (!conductores || conductores.length === 0) {
                console.warn('NO HAY CONDUCTORES');
                conductorSelect.innerHTML = '<option value="">NO HAY CONDUCTORES</option>';
            } else {
                conductorSelect.innerHTML = '<option value="">-- Seleccionar CHOFER --</option>';
                conductores.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id_conductor;
                    opt.textContent = c.nombres + ' ' + c.apellidos;
                    conductorSelect.appendChild(opt);
                });
            }

            const { data: carretas, error: e2 } = await supabaseClient.from('carreta').select('id_carreta, placa').filter('estado', 'eq', true);
            console.log('CARRETAS:', carretas, 'ERROR:', e2);
            
            if (e2) {
                console.error('ERROR CARRETAS:', e2);
                carretaSelect.innerHTML = '<option value="">ERROR: ' + e2.message + '</option>';
            } else if (!carretas || carretas.length === 0) {
                console.warn('NO HAY CARRETAS');
                carretaSelect.innerHTML = '<option value="">NO HAY CARRETAS</option>';
            } else {
                carretaSelect.innerHTML = '<option value="">-- Seleccionar Carreta --</option>';
                carretas.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id_carreta;
                    opt.textContent = c.placa;
                    carretaSelect.appendChild(opt);
                });
            }
        }

        // Cargar servicio y LLENAR formulario
        async function cargarServicio() {
            console.log('�Y"� CARGANDO SERVICIO ID:', idServicio);
            
            const { data, error } = await supabaseClient.from('servicio').select('*').eq('id_servicio', idServicio).single();
            console.log('SERVICIO:', data, 'ERROR:', error);

            if (error) {
                console.error('ERROR CARGANDO SERVICIO:', error);
                mostrarMensaje('Error: ' + error.message, 'error');
                return;
            }

            // CARGAR SELECTS PRIMERO
            await cargarSelects();

            console.log('�Y"� LLENANDO FORMULARIO...');

            document.getElementById('fecha_servicio').value = data.fecha_servicio || '';
            document.getElementById('hora').value = data.hora || '';
            document.getElementById('id_conductor').value = data.id_conductor || '';
            document.getElementById('id_carreta').value = data.id_carreta || '';
            document.getElementById('contenedor').value = data.contenedor || '';
            document.getElementById('agencia').value = data.agencia || '';
            document.getElementById('cliente').value = data.cliente || '';
            document.getElementById('contacto').value = data.contacto || '';
            document.getElementById('factura').value = data.factura || '';
            document.getElementById('punto_salida').value = data.punto_salida || '';
            document.getElementById('punto_llegada').value = data.punto_llegada || '';
            document.getElementById('numero_guia_remision').value = data.numero_guia_remision || '';
            document.getElementById('numero_guia_transporte').value = data.numero_guia_transporte || '';
            document.getElementById('vigencia').value = data.vigencia || '';
            document.getElementById('fecha_entrega').value = data.fecha_entrega || '';
            document.getElementById('entrega_contenedor').value = data.entrega_contenedor || '';
            document.getElementById('observacion_2').value = data.observacion_2 || '';

            const radioTipoContenedor = document.querySelector('input[name="tipo_contenedor"][value="' + data.tipo_contenedor + '"]');
            if (radioTipoContenedor) { radioTipoContenedor.checked = true; console.log('TIPO_CONTENEDOR:', data.tipo_contenedor); }

            const radioTipoCarga = document.querySelector('input[name="tipo_carga"][value="' + data.tipo_carga + '"]');
            if (radioTipoCarga) { radioTipoCarga.checked = true; console.log('TIPO_CARGA:', data.tipo_carga); }

            const radioObservacion1 = document.querySelector('input[name="observacion_1"][value="' + data.observacion_1 + '"]');
            if (radioObservacion1) { radioObservacion1.checked = true; console.log('OBSERVACION_1:', data.observacion_1); }

            console.log('�o. FORMULARIO LLENADO!');
        }

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensaje.style.display = 'none';

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';

            try {
                const servicio = {
                    fecha_servicio: document.getElementById('fecha_servicio').value,
                    hora: document.getElementById('hora').value,
                    id_conductor: parseInt(document.getElementById('id_conductor').value),
                    id_carreta: parseInt(document.getElementById('id_carreta').value),
                    contenedor: document.getElementById('contenedor').value.trim(),
                    agencia: document.getElementById('agencia').value.trim(),
                    cliente: document.getElementById('cliente').value.trim(),
                    contacto: document.getElementById('contacto').value.trim(),
                    tipo_contenedor: document.querySelector('input[name="tipo_contenedor"]:checked').value,
                    tipo_carga: document.querySelector('input[name="tipo_carga"]:checked').value,
                    factura: document.getElementById('factura').value.trim(),
                    punto_salida: document.getElementById('punto_salida').value,
                    punto_llegada: document.getElementById('punto_llegada').value.trim(),
                    numero_guia_remision: document.getElementById('numero_guia_remision').value.trim(),
                    numero_guia_transporte: document.getElementById('numero_guia_transporte').value.trim(),
                    vigencia: document.getElementById('vigencia').value,
                    fecha_entrega: document.getElementById('fecha_entrega').value,
                    entrega_contenedor: document.getElementById('entrega_contenedor').value,
                    observacion_1: document.querySelector('input[name="observacion_1"]:checked').value,
                    observacion_2: document.getElementById('observacion_2').value.trim()
                };

                console.log('�Y"� UPDATE:', servicio);

                const { error: updateError } = await supabaseClient.from('servicio').update(servicio).eq('id_servicio', idServicio);
                console.log('RESULTADO:', updateError);

                if (updateError) {
                    throw new Error('Error: ' + updateError.message);
                }

                mostrarMensaje('Guardado! Redirigiendo...', 'success');
                setTimeout(() => { window.location.href = 'Vista_Servicio.html'; }, 1500);

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Cambios';
            }
        });

        // CARGAR AL INICIO
        cargarServicio();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });
    </script>
