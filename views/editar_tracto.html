<body>
    <nav class="navbar">

                </div>

    <div class="container">
        <h1>Editar Tracto</h1>

        <div class="welcome" style="max-width: 700px;">
            <form id="formEditarTracto">
                <div class="form-group">
                    <label>Placa *:</label>
                    <input type="text" id="placa" maxlength="20" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Marca:</label>
                    <input type="text" id="marca"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Modelo:</label>
                    <input type="text" id="modelo"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Año:</label>
                    <input type="number" id="anio" min="1900" max="2030"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Foto actual:</label>
                    <img id="fotoActual" src="" alt="Foto actual"
                        style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px;">
                </div>

                <div class="form-group">
                    <label>Cambiar foto (opcional):</label>
                    <input type="file" id="fotoInput" accept="image/*"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    <img id="fotoPreview" src="" alt="Vista previa"
                        style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none;">
                    <p style="font-size: 13px; color: var(--text-light); margin-top: 8px;">Deja vacío para mantener la
                        foto actual</p>
                </div>

                <button type="submit" class="btn-primary"
                    style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar
                    Cambios</button>
            </form>

            <div id="mensaje" class="error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 6px;">
            </div>
        </div>

        <a href="Vista_Tracto.html"
            style="display: inline-block; margin-top: 24px; color: var(--primary-red); text-decoration: none; font-weight: 600;">
            Volver a la lista de tractos</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jryfzkfiutekhhxbmezs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_of5dF0BUk5mebRvzDlRecA_Dy7GTKxU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Obtener ID del tracto desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const idTracto = urlParams.get('id');

        if (!idTracto) {
            alert('ID de tracto no proporcionado');
            window.location.href = 'Vista_Tracto.html';
        }

        const form = document.getElementById('formEditarTracto');
        const mensaje = document.getElementById('mensaje');
        const fotoInput = document.getElementById('fotoInput');
        const fotoPreview = document.getElementById('fotoPreview');
        const fotoActual = document.getElementById('fotoActual');

        // Cargar datos del tracto
        async function cargarTracto() {
            try {
                const response =
                    await fetch(
                        `/api/tractos/${idTracto}`
                    );

                const data =
                    await response.json();

                if (!response.ok) {

                    throw new Error(
                        data.message
                    );
                }

               

                // Rellenar formulario
                document.getElementById('placa').value = data.placa || '';
                document.getElementById('marca').value = data.marca || '';
                document.getElementById('modelo').value = data.modelo || '';
                document.getElementById('anio').value = data.anio || '';

                // Mostrar foto actual
                if (data.foto_url) {
                    fotoActual.src = data.foto_url;
                    fotoActual.style.display = 'block';
                } else {
                    fotoActual.style.display = 'none';
                }

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
            }
        }

        // Vista previa de nueva foto
        fotoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoPreview.src = e.target.result;
                    fotoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Guardar cambios
        // Guardar cambios
form.addEventListener('submit', async (e) => {

    e.preventDefault();

    mensaje.style.display = 'none';
    mensaje.className = 'error';

    const submitBtn =
        form.querySelector(
            'button[type="submit"]'
        );

    submitBtn.disabled = true;
    submitBtn.textContent = 'Guardando...';

    try {

        const formData =
            new FormData();

        formData.append(
            'placa',
            document.getElementById('placa').value
        );

        formData.append(
            'marca',
            document.getElementById('marca').value
        );

        formData.append(
            'modelo',
            document.getElementById('modelo').value
        );

        formData.append(
            'anio',
            document.getElementById('anio').value
        );

        formData.append(
            'foto_actual',
            fotoActual.src || ''
        );

        const file =
            fotoInput.files[0];

        if (file) {

            formData.append(
                'foto',
                file
            );
        }

        const response =
            await fetch(
                `/api/tractos/${idTracto}`,
                {
                    method: 'PUT',
                    body: formData
                }
            );

        const data =
            await response.json();

        if (!response.ok) {

            throw new Error(
                data.message ||
                'Error al actualizar'
            );
        }

        mostrarMensaje(
            'Tracto actualizado con éxito! Redirigiendo...',
            'success'
        );

        setTimeout(() => {

            window.location.href =
                'Vista_Tracto.html';

        }, 1500);

    } catch (err) {

        mostrarMensaje(
            'Error: ' + err.message,
            'error'
        );

        submitBtn.disabled = false;

        submitBtn.textContent =
            'Guardar Cambios';
    }
});
        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.className = tipo === 'error' ? 'error' : 'success';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }

        // Cargar datos al iniciar
        cargarTracto();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>

</html>
