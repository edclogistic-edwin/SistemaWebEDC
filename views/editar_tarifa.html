
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarifa - Sistema E&DC</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/style_dashboard.css">
    <link rel="stylesheet" href="../css/editar_tarifa.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>
         <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>
                    <a href="Vista_Empresa_Doc.html">Documentos Empresa</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>
                <div class="dropdown-content">
                    <a href="Vista_Servicio.html">Servicios</a>
                    <a href="Vista_Tarifa.html">Tarifas</a>
                </div>
            </div>
            <a href="Vista_Perfil.html" id="perfilBtn" class="nav-link">Perfil</a>
            <a href="#" id="logoutBtn" class="nav-link logout">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <h1>✏️ Editar Tarifa</h1>

        <div class="welcome" style="max-width: 900px;">
            <form id="formEditarTarifa">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tipo_carga">Tipo de Carga *:</label>
                        <select id="tipo_carga" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                            <option value="">Seleccionar...</option>
                            <option value="GENERAL">General</option>
                            <option value="IMO">IMO</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="zona">Zona *:</label>
                        <select id="zona" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                            <option value="">Seleccionar...</option>
                            <option value="ZONA 1">ZONA 1</option>
                            <option value="ZONA 2">ZONA 2</option>
                            <option value="ZONA 3">ZONA 3</option>
                            <option value="ZONA 4.1">ZONA 4.1</option>
                            <option value="ZONA 4.2">ZONA 4.2</option>
                            <option value="ZONA 5">ZONA 5</option>
                            <option value="ZONA X">ZONA X</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="punto_partida">Punto de Partida:</label>
                        <input type="text" id="punto_partida" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    </div>

                    <div class="form-group">
                        <label for="punto_llegada">Punto de Llegada:</label>
                        <input type="text" id="punto_llegada" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    </div>

                    <div class="form-group">
                        <label for="precio">Precio (USD) *:</label>
                        <input type="number" id="precio" step="0.01" min="0" readonly style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; background: #f5f5f5;">
                    </div>

                    <div class="form-group">
                        <label for="numero_factura">Número de Factura:</label>
                        <input type="text" id="numero_factura" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    </div>

                    <div class="form-group">
                        <label for="agencia">Agencia:</label>
                        <input type="text" id="agencia" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    </div>

                    <div class="form-group">
                        <label for="estado">Estado:</label>
                        <select id="estado" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fecha_inicio">Fecha de Inicio *:</label>
                        <input type="date" id="fecha_inicio" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    </div>

                    <div class="form-group">
                        <label for="fecha_fin">Fecha de Fin *:</label>
                        <input type="date" id="fecha_fin" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="observacion">Observación:</label>
                        <textarea id="observacion" rows="3" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; resize: vertical;"></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar Cambios</button>
            </form>

            <div id="mensaje" class="error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 6px;"></div>
        </div>

        <a href="Vista_Tarifa.html" style="display: inline-block; margin-top: 24px; color: var(--primary-red); text-decoration: none; font-weight: 600;">← Volver a la lista de tarifas</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jryfzkfiutekhhxbmezs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_of5dF0BUk5mebRvzDlRecA_Dy7GTKxU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // OBTENER ID DE LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const idTarifa = urlParams.get('id');

        if (!idTarifa) {
            alert('ID de tarifa no proporcionado');
            window.location.href = 'Vista_Tarifa.html';
        }

        const form = document.getElementById('formEditarTarifa');
        const mensaje = document.getElementById('mensaje');

        // CARGAR TARIFA POR ID
        async function cargarTarifa() {
            try {
                const { data, error } = await supabaseClient
                    .from('tarifa')
                    .select('*')
                    .eq('id_tarifa', idTarifa)
                    .single();

                if (error) {
                    throw new Error('Error al cargar tarifa: ' + error.message);
                }

                // RELLENAR FORMULARIO
                document.getElementById('tipo_carga').value = data.tipo_carga || '';
                document.getElementById('zona').value = data.zona || '';
                document.getElementById('punto_partida').value = data.punto_partida || '';
                document.getElementById('punto_llegada').value = data.punto_llegada || '';
                document.getElementById('precio').value = data.precio || '';
                document.getElementById('numero_factura').value = data.numero_factura || '';
                document.getElementById('agencia').value = data.agencia || '';
                document.getElementById('estado').value = data.estado.toString();
                document.getElementById('fecha_inicio').value = data.fecha_inicio ? data.fecha_inicio.slice(0, 10) : '';
                document.getElementById('fecha_fin').value = data.fecha_fin ? data.fecha_fin.slice(0, 10) : '';
                document.getElementById('observacion').value = data.observacion || '';

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
            }
        }

        // CARGAR AL INICIO
        cargarTarifa();

        // ACTUALIZAR TARIFA
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensaje.style.display = 'none';
            mensaje.className = 'error';

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';

            try {
                const tarifa = {
                    tipo_carga: document.getElementById('tipo_carga').value,
                    zona: document.getElementById('zona').value,
                    punto_partida: document.getElementById('punto_partida').value,
                    punto_llegada: document.getElementById('punto_llegada').value,
                    numero_factura: document.getElementById('numero_factura').value,
                    agencia: document.getElementById('agencia').value,
                    estado: document.getElementById('estado').value === 'true',
                    fecha_inicio: document.getElementById('fecha_inicio').value,
                    fecha_fin: document.getElementById('fecha_fin').value,
                    observacion: document.getElementById('observacion').value
                };

                const { error: updateError } = await supabaseClient
                    .from('tarifa')
                    .update(tarifa)
                    .eq('id_tarifa', idTarifa);

                if (updateError) {
                    throw new Error('Error al actualizar tarifa: ' + updateError.message);
                }

                mostrarMensaje('Tarifa actualizada con éxito! Redirigiendo...', 'success');

                setTimeout(() => {
                    window.location.href = 'Vista_Tarifa.html';
                }, 1500);

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Cambios';
            }
        });

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.className = tipo === 'error' ? 'error' : 'success';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>
</html>
