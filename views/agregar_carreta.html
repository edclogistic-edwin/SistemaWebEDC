    <link rel="stylesheet" href="../css/style_carreta.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>
            <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>
                    <a href="Vista_Empresa_Doc.html">Documentos Empresa</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>
                <div class="dropdown-content">
                    <a href="Vista_Servicio.html">Servicios</a>

                </div>

        </div>
    </nav>

    <div class="container">
        <h1>Agregar Nueva Carreta</h1>

        <div class="welcome" style="max-width: 700px;">
            <form id="formAgregarCarreta">
                <div class="form-group">
                    <label>Placa *:</label>
                    <input type="text" id="placa" maxlength="20" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Tipo:</label>
                    <input type="text" id="tipo"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Tracto *:</label>
                    <select id="id_tracto" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                        <option value="">Seleccionar tracto...</option>
                    </select>
                    <p id="tractoLoading" style="font-size: 13px; color: var(--text-light); margin-top: 8px;">Cargando
                        tractos...</p>
                </div>

                <button type="submit" class="btn-primary"
                    style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar
                    Carreta</button>
            </form>

            <div id="mensaje" class="error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 6px;">
            </div>
        </div>

        <a href="Vista_Carreta.html"
            style="display: inline-block; margin-top: 24px; color: var(--primary-red); text-decoration: none; font-weight: 600;">
            Volver a la lista de carretas</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jryfzkfiutekhhxbmezs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_of5dF0BUk5mebRvzDlRecA_Dy7GTKxU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('formAgregarCarreta');
        const mensaje = document.getElementById('mensaje');
        const idTractoSelect = document.getElementById('id_tracto');
        const tractoLoading = document.getElementById('tractoLoading');

        // Cargar tractos desde la BD (AUTOMÁTICO)
        async function cargarTractos() {
            try {
                const { data, error } = await supabaseClient
                    .from('tracto')
                    .select('*')
                    .eq('estado', true);

                if (error) {
                    throw new Error('Error al cargar tractos: ' + error.message);
                }

                tractoLoading.style.display = 'none';

                if (data.length === 0) {
                    idTractoSelect.innerHTML = '<option value="">No hay tractos disponibles</option>';
                    return;
                }

                // Rellenar dropdown con todos los tractos
                data.forEach(tracto => {
                    const option = document.createElement('option');
                    option.value = tracto.id_tracto;
                    option.textContent = `${tracto.placa} - ${tracto.marca || 'Sin marca'} (Año: ${tracto.anio || 'Sin año'})`;
                    idTractoSelect.appendChild(option);
                });

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
                tractoLoading.style.display = 'none';
            }
        }

        // Guardar carreta
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensaje.style.display = 'none';
            mensaje.className = 'error';

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';

            try {
                const carreta = {
                    placa: document.getElementById('placa').value,
                    tipo: document.getElementById('tipo').value || null,
                    id_tracto: parseInt(document.getElementById('id_tracto').value),
                    estado: true
                };

                const { data: carretaData, error: insertError } = await supabaseClient
                    .from('carreta')
                    .insert([carreta])
                    .select();

                if (insertError) {
                    throw new Error('Error al guardar carreta: ' + insertError.message);
                }

                mostrarMensaje('Carreta guardada con éxito! Redirigiendo...', 'success');

                setTimeout(() => {
                    window.location.href = 'Vista_Carreta.html';
                }, 1500);

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Carreta';
            }
        });

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.className = tipo === 'error' ? 'error' : 'success';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }

        // Cargar tractos al iniciar
        cargarTractos();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>

</html>
