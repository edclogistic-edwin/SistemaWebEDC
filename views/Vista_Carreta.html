    <link rel="stylesheet" href="../css/style_carreta.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>

        <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>
                    <a href="Vista_Empresa_Doc.html">Documentos Empresa</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>
                <div class="dropdown-content">
                    <a href="Vista_Servicio.html">Servicios</a>
                    <a href="Vista_Tarifa.html">Tarifas</a>
                </div>
            </div>

            <a href="Vista_Perfil.html" id="perfilBtn" class="nav-link">Perfil</a>
            <a href="#" id="logoutBtn" class="nav-link logout">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <h1>Lista de Carretas</h1>

        <!-- B�sSQUEDA -->
        <div style="display: flex; gap: 12px; margin-bottom: 20px; align-items: center;">
            <input type="text" id="buscador" placeholder="Buscar por Placa o Tipo..."
                style="flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; font-family: 'Inter', sans-serif;">
            <button id="btnBuscar"
                style="padding: 12px 24px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">Buscar</button>
            <button id="btnRefrescar"
                style="padding: 12px 24px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">Refrescar</button>
        </div>

        <a href="agregar_carreta.html">
            <button class="btn-agregar" style="border: none; background: transparent; cursor: pointer;">Agregar
                Carreta</button>
        </a>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Placa</th>
                        <th>Tipo</th>
                        <th>Tracto</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCarretas">
                    <tr>
                        <td colspan="6">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/dropdown.js"></script>
    <script>
        const SUPABASE_URL = 'https://jryfzkfiutekhhxbmezs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_of5dF0BUk5mebRvzDlRecA_Dy7GTKxU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todasLasCarretas = [];

        async function cargarCarretas() {
            const tbody = document.getElementById('tablaCarretas');

            // JOIN con tabla tracto para mostrar placa y marca del tracto
            const { data, error } = await supabaseClient
                .from('carreta')
                .select(`
                    id_carreta,
                    placa,
                    tipo,
                    id_tracto,
                    estado,
                    tracto: id_tracto (placa, marca)
                `)
                .order('id_carreta', { ascending: false });

            if (error) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: red;">Error: ' + error.message + '</td></tr>';
                return;
            }

            todasLasCarretas = data;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No hay carretas registradas</td></tr>';
                return;
            }

            mostrarCarretas(data);
        }

        function mostrarCarretas(carretas) {
            const tbody = document.getElementById('tablaCarretas');

            if (carretas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No se encontraron carretas</td></tr>';
                return;
            }

            tbody.innerHTML = carretas.map(c => {
                const tracto = c.tracto;
                const tractoTexto = tracto ? `${tracto.placa} - ${tracto.marca || 'Sin marca'}` : 'No asignado';

                return `
                    <tr style="${!c.estado ? 'background: #f5f5f5; color: #666;' : ''}">
                        <td>${c.id_carreta}</td>
                        <td>${c.placa}</td>
                        <td>${c.tipo || '-'}</td>
                        <td>${tractoTexto}</td>
                        <td>${c.estado ? 'Activo' : 'Inactivo'}</td>
                        <td style="text-align: center;">
                            <a href="editar_carreta.html?id=${c.id_carreta}" style="color: #0ea5e9; text-decoration: none; font-weight: 600; margin-right: 8px;">Editar</a>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // FUNCI�"N DE B�sSQUEDA
        function buscarCarretas() {
            const termino = document.getElementById('buscador').value.toLowerCase().trim();

            if (termino === '') {
                mostrarCarretas(todasLasCarretas);
                return;
            }

            const filtradas = todasLasCarretas.filter(c =>
                (c.placa && c.placa.toLowerCase().includes(termino)) ||
                (c.tipo && c.tipo.toLowerCase().includes(termino))
            );

            mostrarCarretas(filtradas);
        }

        // EVENTOS
        document.getElementById('btnBuscar').addEventListener('click', buscarCarretas);

        document.getElementById('buscador').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                buscarCarretas();
            }
        });

        document.getElementById('btnRefrescar').addEventListener('click', () => {
            document.getElementById('buscador').value = '';
            mostrarCarretas(todasLasCarretas);
        });

        cargarCarretas();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>

</html>
