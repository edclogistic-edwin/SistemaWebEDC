<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Carreta - Sistema E&DC</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/style_dashboard.css">
    <link rel="stylesheet" href="../css/style_carreta.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>
           <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>
                    <a href="Vista_Empresa_Doc.html">Documentos Empresa</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>
                <div class="dropdown-content">
                    <a href="Vista_Servicio.html">Servicios</a>
                    <a href="Vista_Tarifa.html">Tarifas</a>
                </div>
            </div>
            <a href="Vista_Perfil.html" id="perfilBtn" class="nav-link">Perfil</a>
            <a href="#" id="logoutBtn" class="nav-link logout">Cerrar Sesión</a>
        </div>
    </nav>
    
    <div class="container">
        <h1>Editar Carreta</h1>
        
        <div class="welcome" style="max-width: 700px;">
            <form id="formEditarCarreta">
                <div class="form-group">
                    <label>Placa *:</label>
                    <input type="text" id="placa" maxlength="20" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                
                <div class="form-group">
                    <label>Tipo:</label>
                    <input type="text" id="tipo" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                
                <div class="form-group">
                    <label>Tracto *:</label>
                    <select id="id_tracto" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                        <option value="">Seleccionar tracto...</option>
                    </select>
                    <p id="tractoLoading" style="font-size: 13px; color: var(--text-light); margin-top: 8px;">Cargando tractos...</p>
                </div>
                
                <button type="submit" class="btn-primary" style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar Cambios</button>
            </form>
            
            <div id="mensaje" class="error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 6px;"></div>
        </div>
        
        <a href="Vista_Carreta.html" style="display: inline-block; margin-top: 24px; color: var(--primary-red); text-decoration: none; font-weight: 600;"> Volver a la lista de carretas</a>
    </div>
    
     <script>
              
        // Obtener ID de la carreta desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const idCarreta = urlParams.get('id');
        
        if (!idCarreta) {
            alert('ID de carreta no proporcionado');
            window.location.href = 'Vista_Carreta.html';
        }
        
        const form = document.getElementById('formEditarCarreta');
        const mensaje = document.getElementById('mensaje');
        const idTractoSelect = document.getElementById('id_tracto');
        const tractoLoading = document.getElementById('tractoLoading');
        
        // Cargar carreta por ID
       async function cargarCarreta() {

    try {

        const response =
            await fetch(
                `/api/carretas/${idCarreta}`
            );

        const data =
            await response.json();

        if (!response.ok) {

            throw new Error(
                data.message
            );
        }

        document.getElementById(
            'placa'
        ).value =
            data.placa || '';

        document.getElementById(
            'tipo'
        ).value =
            data.tipo || '';

        document.getElementById(
            'id_tracto'
        ).value =
            data.id_tracto || '';

    } catch (err) {

        mostrarMensaje(
            'Error: ' + err.message,
            'error'
        );
    }
}
        
        // Cargar tractos desde la BD (AUTOMÁTICO)
        async function cargarTractos() {

    try {

        const response =
            await fetch(
                '/api/tractos-activos'
            );

        const data =
            await response.json();

        if (!response.ok) {

            throw new Error(
                data.message
            );
        }

        tractoLoading.style.display =
            'none';

        if (data.length === 0) {

            idTractoSelect.innerHTML =
                '<option value="">No hay tractos disponibles</option>';

            return;
        }

        data.forEach(
            tracto => {

                const option =
                    document.createElement(
                        'option'
                    );

                option.value =
                    tracto.id_tracto;

                option.textContent =
                    `${tracto.placa} - ${tracto.marca || 'Sin marca'} (Año: ${tracto.anio || 'Sin año'})`;

                idTractoSelect.appendChild(
                    option
                );
            }
        );

    } catch (err) {

        mostrarMensaje(
            'Error: ' + err.message,
            'error'
        );

        tractoLoading.style.display =
            'none';
    }
}
        
        // Guardar cambios
      form.addEventListener(
    'submit',
    async (e) => {

        e.preventDefault();

        mensaje.style.display =
            'none';

        const submitBtn =
            form.querySelector(
                'button[type="submit"]'
            );

        submitBtn.disabled =
            true;

        submitBtn.textContent =
            'Guardando...';

        try {

            const carreta = {

                placa:
                    document.getElementById(
                        'placa'
                    ).value,

                tipo:
                    document.getElementById(
                        'tipo'
                    ).value || null,

                id_tracto:
                    document.getElementById(
                        'id_tracto'
                    ).value || null
            };

            const response =
                await fetch(
                    `/api/carretas/${idCarreta}`,
                    {
                        method: 'PUT',

                        headers: {
                            'Content-Type':
                                'application/json'
                        },

                        body: JSON.stringify(
                            carreta
                        )
                    }
                );

            const data =
                await response.json();

            if (!response.ok) {

                throw new Error(
                    data.message
                );
            }

            mostrarMensaje(
                'Carreta actualizada con éxito!',
                'success'
            );

            setTimeout(
                () => {

                    window.location.href =
                        'Vista_Carreta.html';

                },
                1500
            );

        } catch (err) {

            mostrarMensaje(
                'Error: ' + err.message,
                'error'
            );

            submitBtn.disabled =
                false;

            submitBtn.textContent =
                'Guardar Cambios';
        }
    }
);
        
        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.className = tipo === 'error' ? 'error' : 'success';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }
        
        // Cargar carreta y tractos al iniciar
        cargarCarreta();
        cargarTractos();
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });
        
        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>
</html>
