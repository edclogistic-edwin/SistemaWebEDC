<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Proveedor - Sistema E&DC</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/style_dashboard.css">
    <link rel="stylesheet" href="../css/style_proveedor.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>
            <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>
                    <a href="Vista_Empresa_Doc.html">Documentos Empresa</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>
                <div class="dropdown-content">
                    <a href="Vista_Servicio.html">Servicios</a>
                    <a href="Vista_Tarifa.html">Tarifas</a>
                </div>
            </div>
            <a href="Vista_Perfil.html" id="perfilBtn" class="nav-link">Perfil</a>
            <a href="#" id="logoutBtn" class="nav-link logout">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <h1>Editar Proveedor</h1>

        <div class="welcome" style="max-width: 700px;">
            <form id="formEditarProveedor">
                <div class="form-group">
                    <label>RUC *:</label>
                    <input type="text" id="ruc" maxlength="11" required pattern="\d{11}" placeholder="11 dígitos"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    <p style="font-size: 13px; color: var(--text-light); margin-top: 4px;">Solo números, 11 dígitos</p>
                </div>

                <div class="form-group">
                    <label>Nombre *:</label>
                    <input type="text" id="nombre" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" id="telefono" placeholder="(01) 4652959"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Correo:</label>
                    <input type="email" id="correo" placeholder="ejemplo@gmail.com"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Dirección:</label>
                    <input type="text" id="direccion"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Observaciones:</label>
                    <input type="text" id="observaciones"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>

                <div class="form-group">
                    <label>Estado:</label>
                    <select id="estado"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary"
                    style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar
                    Cambios</button>
            </form>

            <div id="mensaje" class="error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 6px;">
            </div>
        </div>

        <a href="Vista_Proveedor.html"
            style="display: inline-block; margin-top: 24px; color: var(--primary-red); text-decoration: none; font-weight: 600;">Volver
            a la lista de proveedores</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idProveedor = urlParams.get('id');

        if (!idProveedor) {
            alert('ID de proveedor no proporcionado');
            window.location.href = 'Vista_Proveedor.html';
        }

        const form = document.getElementById('formEditarProveedor');
        const mensaje = document.getElementById('mensaje');

        // Cargar proveedor por ID
        async function cargarProveedor() {
            try {
                const response =
                    await fetch(
                        `/api/proveedores/${idProveedor}`
                    );

                const data =
                    await response.json();

                if (!response.ok) {

                    throw new Error(
                        data.message
                    );
                }
                // Rellenar formulario
                document.getElementById('ruc').value = data.ruc || '';
                document.getElementById('nombre').value = data.nombre || '';
                document.getElementById('telefono').value = data.telefono || '';
                document.getElementById('correo').value = data.correo || '';
                document.getElementById('direccion').value = data.direccion || '';
                document.getElementById('observaciones').value = data.observaciones || '';
                document.getElementById('estado').value = data.estado.toString();

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensaje.style.display = 'none';
            mensaje.className = 'error';

            // Validar RUC (11 dígitos)
            const ruc = document.getElementById('ruc').value;
            if (!/^\d{11}$/.test(ruc)) {
                mostrarMensaje('El RUC debe tener 11 dígitos numéricos', 'error');
                return;
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';

            try {
                const proveedor = {
                    ruc: ruc,
                    nombre: document.getElementById('nombre').value,
                    telefono: document.getElementById('telefono').value || null,
                    correo: document.getElementById('correo').value || null,
                    direccion: document.getElementById('direccion').value || null,
                    observaciones: document.getElementById('observaciones').value || null,
                    estado: document.getElementById('estado').value === 'true'
                };

                const response =
                    await fetch(
                        `/api/proveedores/${idProveedor}`,
                        {
                            method: 'PUT',
                            headers: {
                                'Content-Type':
                                    'application/json'
                            },
                            body: JSON.stringify(
                                proveedor
                            )
                        }
                    );

                const data =
                    await response.json();

                if (!response.ok) {

                    throw new Error(
                        data.message
                    );
                }
                mostrarMensaje('Proveedor actualizado con éxito! Redirigiendo...', 'success');

                setTimeout(() => {
                    window.location.href = 'Vista_Proveedor.html';
                }, 1500);

            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Cambios';
            }
        });

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.className = tipo === 'error' ? 'error' : 'success';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }

        // Cargar proveedor al iniciar
        cargarProveedor();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>

</html>
