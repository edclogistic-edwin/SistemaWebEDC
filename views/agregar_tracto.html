    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/style_dashboard.css">
    <link rel="stylesheet" href="../css/style_tracto.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/logo.png.png" alt="Logo Sistema E&DC" class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html">Inicio</a>
            <div class="dropdown">
                <button class="dropbtn">Administracion </button>
                <div class="dropdown-content">
                    <a href="Vista_Conductor.html">Conductores</a>
                    <a href="Vista_Tracto.html" class="active">Tractos</a>
                    <a href="Vista_Carreta.html">Carretas</a>
                    <a href="Vista_Proveedor.html" class="active">Proveedores</a>
                    <a href="Vista_TipoDoc.html">Tipos de Documento</a>
                    <a href="Vista_Conductor_Doc.html">Documentos Conductor</a>
                    <a href="Vista_Tracto_Doc.html">Documentos Tracto</a>
                    <a href="Vista_Carreta_Doc.html">Documentos Carreta</a>
                    <a href="Vista_Empresa_Doc.html">Documentos Empresa</a>

                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Gestion de Servicios </button>
                <div class="dropdown-content">
                    <a href="Vista_Servicio.html">Servicios</a>

                </div>
            </div>
            <a href="Vista_Perfil.html" id="perfilBtn" class="nav-link">Perfil</a>
            <a href="#" id="logoutBtn" class="nav-link logout">Cerrar Sesión</a>
        </div>
    </nav>
    
    <div class="container">
        <h1>Agregar Nuevo Tracto</h1>
        
        <div class="welcome" style="max-width: 700px;">
            <form id="formAgregarTracto">
                <div class="form-group">
                    <label>Placa *:</label>
                    <input type="text" id="placa" maxlength="20" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                
                <div class="form-group">
                    <label>Marca:</label>
                    <input type="text" id="marca" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                
                <div class="form-group">
                    <label>Modelo:</label>
                    <input type="text" id="modelo" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                
                <div class="form-group">
                    <label>Año:</label>
                    <input type="number" id="anio" min="1900" max="2030" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                </div>
                
                <div class="form-group">
                    <label>Foto del Tracto *:</label>
                    <input type="file" id="fotoInput" accept="image/*" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px;">
                    <img id="fotoPreview" src="" alt="Vista previa" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none;">
                </div>
                
                <button type="submit" class="btn-primary" style="padding: 12px 32px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px;">Guardar Tracto</button>
            </form>
            
            <div id="mensaje" class="error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 6px;"></div>
        </div>
        
        <a href="Vista_Tracto.html" style="display: inline-block; margin-top: 24px; color: var(--primary-red); text-decoration: none; font-weight: 600;"> Volver a la lista de tractos</a>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
         const SUPABASE_URL = 'https://jryfzkfiutekhhxbmezs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_of5dF0BUk5mebRvzDlRecA_Dy7GTKxU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const form = document.getElementById('formAgregarTracto');
        const mensaje = document.getElementById('mensaje');
        const fotoInput = document.getElementById('fotoInput');
        const fotoPreview = document.getElementById('fotoPreview');
        
        fotoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoPreview.src = e.target.result;
                    fotoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensaje.style.display = 'none';
            mensaje.className = 'error';
            
            const file = fotoInput.files[0];
            if (!file) {
                mostrarMensaje('Selecciona una foto', 'error');
                return;
            }
            
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Subiendo...';
            
            try {
                const fileName = `tracto_${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('archivos')
                    .upload(fileName, file);
                
                if (uploadError) {
                    throw new Error('Error al subir imagen: ' + uploadError.message);
                }
                
                const { data: urlData } = supabaseClient.storage
                    .from('archivos')
                    .getPublicUrl(fileName);
                
                const fotoUrl = urlData.publicUrl;
                
                const tracto = {
                    placa: document.getElementById('placa').value,
                    marca: document.getElementById('marca').value || null,
                    modelo: document.getElementById('modelo').value || null,
                    anio: document.getElementById('anio').value ? parseInt(document.getElementById('anio').value) : null,
                    foto_url: fotoUrl,
                    estado: true
                };
                
                const { data: tractoData, error: insertError } = await supabaseClient
                    .from('tracto')
                    .insert([tracto])
                    .select();
                
                if (insertError) {
                    throw new Error('Error al guardar tracto: ' + insertError.message);
                }
                
                mostrarMensaje('Tracto guardado con éxito! Redirigiendo...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'Vista_Tracto.html';
                }, 1500);
                
            } catch (err) {
                mostrarMensaje('Error: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Tracto';
            }
        });
        
        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.style.display = 'block';
            mensaje.className = tipo === 'error' ? 'error' : 'success';
            mensaje.style.background = tipo === 'error' ? '#fee2e2' : '#d1fae5';
            mensaje.style.color = tipo === 'error' ? '#dc2626' : '#059669';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });
        
        document.getElementById('perfilBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'Vista_Perfil.html';
        });
    </script>
</body>
</html>
